<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .header h1 {
      font-size: 13px;
      font-weight: 600;
      color: #e6edf3;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ef4444;
      flex-shrink: 0;
    }
    .dot.connected { background: #22c55e; animation: pulse 2s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .status {
      font-size: 11px;
      color: #8b949e;
      padding: 8px 10px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      margin-bottom: 8px;
    }
    .status strong { color: #c9d1d9; }
    .info {
      font-size: 10px;
      color: #6e7681;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="dot" id="dot"></div>
    <h1>Oasis Chrome Bridge</h1>
  </div>
  <div class="status" id="status">Checking...</div>
  <div class="info">
    Connects to <strong>dev-agent</strong> on localhost:8008 for computer-use page extraction.
  </div>
  <script src="popup.js"></script>
</body>
</html>
